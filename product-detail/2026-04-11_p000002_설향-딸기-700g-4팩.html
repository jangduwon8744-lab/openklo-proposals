<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>천안 설향 딸기</title>
  <meta name="description" content="" />
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: #f6f8fb;
      color: #142033;
      font-family: "Pretendard", "Noto Sans KR", Arial, sans-serif;
      line-height: 1.78;
    }
    .page {
      max-width: 1080px;
      margin: 0 auto;
      padding: 32px 20px 72px;
    }
    .hero {
      background: linear-gradient(135deg, #132238 0%, #1b3150 100%);
      border-radius: 28px;
      overflow: hidden;
      color: #fff;
      box-shadow: 0 18px 42px rgba(16, 24, 40, 0.14);
      margin-bottom: 28px;
    }
    .hero-image-wrap {
      width: 100%;
    }
    .hero-image {
      width: 100%;
      display: block;
      object-fit: cover;
      max-height: 640px;
    }
    .hero-body {
      padding: 30px 28px 32px;
    }
    .hero-title {
      font-size: 36px;
      line-height: 1.28;
      font-weight: 800;
      margin: 0 0 12px;
    }
    .hero-desc {
      font-size: 16px;
      color: rgba(255,255,255,0.88);
      margin: 0;
      max-width: 760px;
    }
    .section {
      background: #fff;
      border: 1px solid #e7edf5;
      border-radius: 22px;
      padding: 26px 24px;
      box-shadow: 0 12px 28px rgba(16, 24, 40, 0.05);
      margin-bottom: 20px;
    }
    .section-title {
      margin: 0 0 12px;
      font-size: 22px;
      font-weight: 800;
      color: #15253b;
    }
    .paragraph {
      color: #314155;
      font-size: 16px;
    }
    .hero-copy {
      text-align: center;
      padding: 32px 24px;
    }
    .hero-copy-title {
      margin: 0 0 12px;
      font-size: 34px;
      line-height: 1.35;
      color: #15253b;
    }
    .hero-copy-text {
      max-width: 760px;
      margin: 0 auto;
      font-size: 17px;
      color: #415267;
      line-height: 1.8;
    }
    .split-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      align-items: center;
    }
    .split-grid.reverse .split-content { order: 1; }
    .split-grid.reverse .split-media { order: 2; }
    .split-image {
      width: 100%;
      display: block;
      border-radius: 18px;
      min-height: 360px;
      max-height: 520px;
      object-fit: cover;
      box-shadow: 0 10px 22px rgba(16, 24, 40, 0.08);
    }
    .placeholder-box {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f2f5f9;
      color: #7a8798;
      font-size: 14px;
    }
    .bullets {
      margin: 0;
      padding-left: 22px;
      color: #314155;
      font-size: 16px;
    }
    .bullets li {
      margin: 10px 0;
    }
    .point-cards {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }
    .point-card {
      border: 1px solid #e9edf4;
      border-radius: 16px;
      padding: 18px 16px;
      background: linear-gradient(180deg, #ffffff 0%, #fafcff 100%);
      min-height: 92px;
      display: flex;
      align-items: center;
    }
    .point-card-text {
      font-size: 15px;
      line-height: 1.65;
      color: #25354a;
      font-weight: 600;
    }
    .gallery {
      display: grid;
      gap: 18px;
    }
    .gallery-large {
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    }
    .gallery-item {
      margin: 0;
      background: #fff;
    }
    .gallery-item img {
      width: 100%;
      display: block;
      border-radius: 18px;
      min-height: 280px;
      max-height: 420px;
      object-fit: cover;
      box-shadow: 0 10px 22px rgba(16, 24, 40, 0.08);
    }
    .spec-table {
      display: flex;
      flex-direction: column;
      border: 1px solid #e9edf4;
      border-radius: 16px;
      overflow: hidden;
    }
    .spec-row {
      display: grid;
      grid-template-columns: 180px 1fr;
      border-bottom: 1px solid #edf2f7;
    }
    .spec-row:last-child {
      border-bottom: 0;
    }
    .spec-key {
      background: #f8fafc;
      padding: 14px 16px;
      font-weight: 700;
      color: #516173;
    }
    .spec-value {
      padding: 14px 16px;
      color: #233247;
    }
    .notice {
      background: #fffaf1;
      border-color: #f2dfb0;
    }
    @media (max-width: 900px) {
      .split-grid, .split-grid.reverse {
        grid-template-columns: 1fr;
      }
      .split-grid.reverse .split-content,
      .split-grid.reverse .split-media {
        order: initial;
      }
    }
    @media (max-width: 768px) {
      .page {
        padding: 20px 14px 48px;
      }
      .hero-title {
        font-size: 28px;
      }
      .gallery-large {
        grid-template-columns: 1fr;
      }
      .spec-row {
        grid-template-columns: 1fr;
      }
      .point-cards {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="hero">
      <div class="hero-image-wrap"><img class="hero-image" src="https://github.com/jangduwon8744-lab/trace_image/blob/main/%EC%84%A0%EB%AC%BC%EC%84%B8%ED%8A%B8.jpg?raw=true" alt="천안 설향 딸기" /></div>
      <div class="hero-body">
        <h1 class="hero-title">천안 설향 딸기</h1>
        
      </div>
    </section>
    





    <section class="section notice">
      <div class="section-title">신선 딸기 구매 안내</div>
      <div class="paragraph">- 신선식품 특성상 크기·색·맛에는 자연스러운 편차가 있을 수 있습니다.<br/>- 배송 중 미세한 흠집이 생길 수 있습니다. 품질에 큰 문제가 없는 경우 교환·반품이 어려울 수 있습니다.<br/>- 수령 즉시 냉장 보관하고 가능한 빨리 드세요. 설향은 과육이 부드러워 장기 보관에 취약합니다.<br/>- 상품에 이상이 있을 경우, 수령 당일 사진과 함께 문의해 주세요.</div>
    </section>
  

  </div>
</body>
</html>
